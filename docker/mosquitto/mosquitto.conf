# OpenMDM Mosquitto Configuration

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
connection_messages true

# MQTT Listener (port 1883)
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket Listener (port 9001)
listener 9001
protocol websockets
allow_anonymous true

# Message size limit (10MB for APK metadata)
message_size_limit 10485760

# Keep alive settings
max_keepalive 300
